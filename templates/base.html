<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Abney — Hope Valley, Peak District{% endblock %}</title>
        
        <!-- SEO -->
        <meta name="description" content="{% block description %}Abney is a small, historic village in the Hope Valley, Peak District National Park, Derbyshire.{% endblock %}">
        <meta name="keywords" content="Abney, Hope Valley, Peak District, Derbyshire, village, village hall">
        <meta name="author" content="Abney Village">
    
        <!-- Open Graph (social sharing) -->
        <meta property="og:title" content="{% block og_title %}Abney — Hope Valley, Peak District{% endblock %}">
        <meta property="og:description" content="{% block og_description %}Abney is a small, historic village in the Hope Valley, Peak District National Park, Derbyshire.{% endblock %}">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://www.abney-hope-valley.co.uk">
        <meta property="og:image" content="{% block og_image %}{{ r2_url }}/carousel/village1.jpeg{% endblock %}">
    
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">

        <!-- Favicons -->
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
        <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    </head>
<body class="bg-village-cream font-body text-village-dark">

    <!-- Navbar -->
    <nav class="bg-village-green sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            
            <!-- Village name / logo -->
            <a href="/" class="font-heading text-2xl text-village-cream tracking-wide">Abney</a>
    
            <!-- Hamburger button (mobile only) -->
            <button id="menu-toggle" class="md:hidden text-village-cream focus:outline-none">
                <svg id="icon-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
                <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
    
            <!-- Nav links (desktop) -->
            <ul class="hidden md:flex gap-8 text-village-cream font-body text-sm uppercase tracking-widest">
                <li><a href="/" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/' else 'hover:text-village-stone' }}">Home</a></li>
                <li><a href="/about" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/about' else 'hover:text-village-stone' }}">About</a></li>
                <li><a href="/gallery" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/gallery' else 'hover:text-village-stone' }}">Gallery</a></li>
                <li><a href="/village-hall" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/village-hall' else 'hover:text-village-stone' }}">Village Hall</a></li>
                <li><a href="/find-us" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/find-us' else 'hover:text-village-stone' }}">Find Us</a></li>
            </ul>
    
        </div>
    
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden bg-village-green border-t border-village-lightgreen">
            <ul class="flex flex-col px-4 py-4 gap-4 text-village-cream font-body text-sm uppercase tracking-widest">
                <li><a href="/" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/' else 'hover:text-village-stone' }}">Home</a></li>
                <li><a href="/about" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/about' else 'hover:text-village-stone' }}">About</a></li>
                <li><a href="/gallery" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/gallery' else 'hover:text-village-stone' }}">Gallery</a></li>
                <li><a href="/village-hall" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/village-hall' else 'hover:text-village-stone' }}">Village Hall</a></li>
                <li><a href="/find-us" class="transition-colors {{ 'text-village-stone border-b border-village-stone' if request.path == '/find-us' else 'hover:text-village-stone' }}">Find Us</a></li>
            </ul>
        </div>
    </nav>
    
    </nav>

    <main class="opacity-0 transition-opacity duration-500">
        <!-- Page content -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        <footer class="bg-village-green text-village-cream mt-16">
            <div class="max-w-6xl mx-auto px-4 py-10 flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="hidden md:block">
                    <p class="font-heading text-xl mb-1">Abney</p>
                    <p class="text-sm opacity-70">Hope Valley, Peak District, Derbyshire</p>
                </div>
                <ul class="flex gap-6 text-sm uppercase tracking-widest opacity-70">
                    <li><a href="/about" class="hover:opacity-100 transition">About</a></li>
                    <li><a href="/gallery" class="hover:opacity-100 transition">Gallery</a></li>
                    <li><a href="/village-hall" class="hover:opacity-100 transition">Village Hall</a></li>
                    <li><a href="/find-us" class="hover:opacity-100 transition">Find Us</a></li>
                </ul>
            </div>
        </footer>

        {% block scripts %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/transitions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
</body>
</html>
