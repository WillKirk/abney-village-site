{% extends "base.html" %}

{% block title %}Gallery — Abney{% endblock %}

{% block content %}

<!-- Page Header -->
<div class="bg-village-green text-white py-16 text-center">
    <h1 class="font-heading text-5xl mb-4">Gallery</h1>
    <p class="text-lg opacity-80 uppercase tracking-widest">Abney Through The Seasons</p>
</div>

<!-- Photo Grid -->
<section class="max-w-6xl mx-auto px-4 py-16">
    {% if images %}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for image in images %}
        <div class="group overflow-hidden rounded-lg shadow-md hover:shadow-xl transition-shadow cursor-pointer"
             onclick="openLightbox('{{ r2_url }}/{{ image }}')">
            <img src="{{ r2_url }}/{{ image }}" 
                 alt="Abney village" 
                 class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-300">
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-center text-gray-500">No images available.</p>
    {% endif %}
</section>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center"
     onclick="closeLightbox()">
    <button class="absolute top-4 right-6 text-white text-4xl">&times;</button>
    <img id="lightbox-img" src="" alt="Full size image" 
         class="max-w-5xl max-h-[90vh] object-contain px-4">
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/gallery.js') }}"></script>
{% endblock %}
